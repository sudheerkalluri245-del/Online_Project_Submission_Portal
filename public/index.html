<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Portal — Login</title>
  <meta name="description" content="Online Project Submission Portal. Login or register as a student or faculty member."/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="auth-container">
  <div class="auth-box">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon">🎓</div>
      <h1>Project Portal</h1>
      <p>Online Submission System</p>
    </div>

    <!-- Tab Switcher -->
    <div class="tab-btns">
      <button class="tab-btn active" id="loginTab" onclick="showTab('login')">Login</button>
      <button class="tab-btn" id="registerTab" onclick="showTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" required/>
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
      <div class="alert" id="loginAlert"></div>
    </form>

    <!-- REGISTER FORM (hidden by default) -->
    <form id="registerForm" onsubmit="handleRegister(event)" style="display:none;">
      <div class="form-group">
        <label for="regName">Full Name</label>
        <input type="text" id="regName" placeholder="Your full name" required/>
      </div>
      <div class="form-group">
        <label for="regEmail">Email Address</label>
        <input type="email" id="regEmail" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" placeholder="Min. 6 characters" required minlength="6"/>
      </div>
      <div class="form-group">
        <label for="regRole">I am a...</label>
        <select id="regRole">
          <option value="student">👨‍🎓 Student</option>
          <option value="faculty">👨‍🏫 Faculty</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" id="registerBtn">Create Account</button>
      <div class="alert" id="registerAlert"></div>
    </form>
  </div>
</div>

<script>
  const API = window.location.origin + '/api';

  // If user is already logged in, redirect them
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (token && user) {
    window.location.href = user.role === 'faculty' ? 'faculty.html' : 'student.html';
  }

  // Switch between Login and Register tabs
  function showTab(tab) {
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('loginTab').classList.toggle('active', tab === 'login');
    document.getElementById('registerTab').classList.toggle('active', tab === 'register');
  }

  // Show an alert message under a form
  function showAlert(id, message, type = 'error') {
    const el = document.getElementById(id);
    el.textContent = message;
    el.className = `alert show alert-${type}`;
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  // Handle LOGIN
  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Signing in...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value
        })
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.message);

      // Save token and user to localStorage
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));

      showAlert('loginAlert', 'Login successful! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = data.user.role === 'faculty' ? 'faculty.html' : 'student.html';
      }, 800);
    } catch (err) {
      showAlert('loginAlert', err.message);
    } finally {
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  }

  // Handle REGISTER
  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    btn.textContent = 'Creating account...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('regName').value,
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value,
          role: document.getElementById('regRole').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);

      // Save and redirect
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));

      showAlert('registerAlert', 'Account created! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = data.user.role === 'faculty' ? 'faculty.html' : 'student.html';
      }, 800);
    } catch (err) {
      showAlert('registerAlert', err.message);
    } finally {
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
